name: Weekly Release Scout

on:
  schedule:
    - cron: "17 9 * * 5"
      timezone: "Australia/Sydney"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: |
          python -m music_release_scout.main --config config.json --output-dir output --state-path data/state.json

      - name: Upload digest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: music-release-digest
          path: output/

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update music release scout state"
            git push
          fi
